<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Storage unavailability banner (injected by JS if needed) -->

  <header aria-label="Dashboard header">
    <section id="greeting" aria-label="Greeting widget">
      <time id="clock" datetime="" aria-live="polite" aria-label="Current time">00:00:00</time>
      <p id="date-display" aria-label="Current date"></p>
      <h1 id="greeting-text">Good Morning</h1>

      <div class="username-form">
        <label for="username-input">Your name</label>
        <input
          id="username-input"
          type="text"
          maxlength="50"
          placeholder="Enter your name"
          aria-label="Enter your name"
          aria-describedby="username-error"
          autocomplete="off"
        >
        <button id="username-save" type="button" aria-label="Save name">Save</button>
        <span id="username-error" role="alert" aria-live="polite"></span>
      </div>
    </section>

    <button id="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
      Toggle Theme
    </button>
  </header>

  <main>
    <div class="dashboard-grid">

      <!-- Pomodoro Timer Widget -->
      <section id="timer" aria-label="Pomodoro timer">
        <h2>Focus Timer</h2>
        <div id="timer-display" role="timer" aria-live="polite" aria-label="Timer display">25:00</div>
        <div class="timer-controls">
          <button id="timer-start" type="button" aria-label="Start timer">Start</button>
          <button id="timer-stop" type="button" aria-label="Stop timer" disabled>Stop</button>
          <button id="timer-reset" type="button" aria-label="Reset timer">Reset</button>
        </div>
        <div class="timer-duration-form">
          <label for="timer-duration-input">Duration (minutes)</label>
          <input
            id="timer-duration-input"
            type="number"
            min="1"
            max="60"
            placeholder="25"
            aria-label="Set timer duration in minutes"
            aria-describedby="timer-error"
          >
          <button id="timer-duration-save" type="button" aria-label="Set timer duration">Set</button>
          <span id="timer-error" role="alert" aria-live="polite"></span>
        </div>
        <div id="timer-notification" aria-live="polite" role="status"></div>
      </section>

      <!-- To-Do List Widget -->
      <section id="todo" aria-label="To-do list">
        <h2>To-Do List</h2>
        <div class="todo-add-form">
          <label for="todo-input">New task</label>
          <input
            id="todo-input"
            type="text"
            placeholder="Add a new task…"
            aria-label="New task text"
            aria-describedby="todo-error"
            autocomplete="off"
          >
          <button id="todo-add" type="button" aria-label="Add task">Add</button>
          <span id="todo-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="todo-sort-form">
          <label for="todo-sort">Sort by</label>
          <select id="todo-sort" aria-label="Sort tasks">
            <option value="default">Default</option>
            <option value="az">A–Z</option>
            <option value="za">Z–A</option>
            <option value="completed-last">Completed Last</option>
          </select>
        </div>
        <ul id="todo-list" aria-label="Task list"></ul>
      </section>

      <!-- Quick Links Panel -->
      <section id="links" aria-label="Quick links panel">
        <h2>Quick Links</h2>
        <div class="link-add-form">
          <label for="link-label-input">Label</label>
          <input
            id="link-label-input"
            type="text"
            maxlength="30"
            placeholder="Site name"
            aria-label="Link label"
            aria-describedby="link-error"
            autocomplete="off"
          >
          <label for="link-url-input">URL</label>
          <input
            id="link-url-input"
            type="url"
            placeholder="https://example.com"
            aria-label="Link URL"
            aria-describedby="link-error"
            autocomplete="off"
          >
          <button id="link-add" type="button" aria-label="Add link">Add Link</button>
          <span id="link-error" role="alert" aria-live="polite"></span>
        </div>
        <div id="link-panel" role="list" aria-label="Saved links"></div>
      </section>

    </div>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
